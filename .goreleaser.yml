project_name: mdtohtml

before:
  hooks:
    - go mod tidy

builds:
  - id: app
    binary: mdtohtml
    main: ./
    env:
      - CGO_ENABLED=0

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
